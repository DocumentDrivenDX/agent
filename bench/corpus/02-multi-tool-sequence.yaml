id: multi-tool-sequence
description: "Multi-tool sequence: find Go files and count their lines"
prompt: |
  Find all *.go files in the current directory (non-recursive) and count the
  total number of lines across all of them. Show the file count and line count.
expected_tools:
  - glob
  - read
permissions: safe
effort: low
tags:
  - tool-use
  - multi-step
