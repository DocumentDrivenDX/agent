# Phase A.1 anchor profile — selected by the Step 0 census in
# docs/research/model-census-2026-04-29.md §5. GPT-5.3-mini (OpenAI / GPT-5
# family) was picked as the anchor because it is the strongest tool-use row
# inside the ≤ $3/Mtok output bracket and inside the ≥ 2025-11-01 recency
# window. Pricing values are vendor list price as of resolved_at; cost
# reconciliation hashes this YAML per cell run per SD-010 §6.3.
#
# `versioning.snapshot` pins the resolved date-stamped snapshot at
# profile-creation time. Aliases (e.g. plain "gpt-5.3-mini") drift as the
# vendor refreshes the underlying weights; matrix runs MUST cite the pinned
# snapshot so a row stays comparable across reruns. The adapter
# `apply_profile` step echoes this snapshot back into report.json per
# SD-010 §3 / §4.1; if the adapter resolves a different snapshot at
# runtime, the cell is logged as a profile-snapshot drift and excluded
# from cross-cell aggregation.
id: gpt-5-3-mini
provider:
  type: openai
  model: gpt-5.3-mini
  base_url: https://api.openai.com/v1
  api_key_env: OPENAI_API_KEY
pricing:
  input_usd_per_mtok: 0.25
  output_usd_per_mtok: 2.00
  cached_input_usd_per_mtok: 0.05
limits:
  max_output_tokens: 16384
  context_tokens: 400000
  rate_limit_rpm: 500
  rate_limit_tpm: 200000
sampling:
  temperature: 0.0
  reasoning: medium
versioning:
  resolved_at: "2026-04-29"
  snapshot: "gpt-5.3-mini-2026-01-15"
